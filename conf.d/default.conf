server {
    listen 8080;

    # ========= Basic Auth（统一管 web + bot） =========
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ========= Health Check（不鉴权） =========
    location = / {
        auth_basic off;
        default_type text/plain;
        return 200 "Gateway OK\n";
    }

    # ========= realestate-web =========
    location = /realestate-web {
        return 301 /realestate-web/;
    }

    location /realestate-web/ {
        proxy_set_header Host realestate-web-369629851192.asia-northeast1.run.app;
        proxy_ssl_server_name on;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass https://realestate-web-369629851192.asia-northeast1.run.app/;
    }

    # ========= realestate-bot =========
    location = /realestate-bot {
        return 301 /realestate-bot/;
    }

    location /realestate-bot/ {
        proxy_set_header Host realestate-bot-369629851192.asia-northeast1.run.app;
        proxy_ssl_server_name on;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass https://realestate-bot-369629851192.asia-northeast1.run.app/;
    }

    # ========= 兜底 =========
    location / {
        return 404;
    }
}
