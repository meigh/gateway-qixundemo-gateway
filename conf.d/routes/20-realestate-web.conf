# ========= realestate-web =========
location = /realestate-web {
    return 301 /realestate-web/;
}

location ^~ /realestate-web/ {
    add_header X-Qixun-Gateway "nginx-gateway" always;

    proxy_set_header Host realestate-web-369629851192.asia-northeast1.run.app;
    proxy_ssl_server_name on;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass https://realestate-web-369629851192.asia-northeast1.run.app/;
}