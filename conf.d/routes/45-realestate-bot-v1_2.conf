# ===== realestate-bot v1.2 =====

location = /realestate-bot/v1.2 {
    return 301 /realestate-bot/v1.2/;
}

location ^~ /realestate-bot/v1.2/ {
    add_header X-Qixun-Gateway "nginx-gateway" always;
    add_header X-Qixun-Version "v1.2" always;

    proxy_set_header Host realestate-bot-v1-2-369629851192.asia-northeast1.run.app;
    proxy_ssl_server_name on;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter '"/openapi.json"' '"/realestate-bot/v1.2/openapi.json"';

    rewrite ^/realestate-bot/v1\.2/(.*)$ /$1 break;

    proxy_pass https://realestate-bot-v1-2-369629851192.asia-northeast1.run.app/;
}
