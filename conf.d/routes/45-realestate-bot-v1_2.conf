# ===== realestate-bot v1.2 (stable channel) =====

# 裸路径重定向到带斜杠版本，方便浏览器使用
location = /realestate-bot/v1.2 {
    return 301 /realestate-bot/v1.2/;
}

location ^~ /realestate-bot/v1.2/ {
    # 统一网关标记
    add_header X-Qixun-Gateway "nginx-gateway" always;
    add_header X-Qixun-Channel "stable" always;
    add_header X-Qixun-Version "v1.2" always;

    # 透传客户端信息
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Swagger/OpenAPI 兼容：把内嵌的 /openapi.json 改成带前缀的路径
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter '"/openapi.json"' '"/realestate-bot/v1.2/openapi.json"';

    # 剥掉 /realestate-bot/v1.2/ 前缀，让后端依然用原生 /
    rewrite ^/realestate-bot/v1.2/(.*)$ /$1 break;

    # ✅ 这里直接用“已经验证 OK 的” beta 域名做 upstream
    proxy_pass https://realestate-bot-v1-2-369629851192.asia-northeast1.run.app;
}
