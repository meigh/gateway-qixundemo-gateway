# ===== realestate-bot canary (points to v1.2 for now) =====

location = /realestate-bot/canary {
    return 301 /realestate-bot/canary/;
}

location ^~ /realestate-bot/canary/ {
    add_header X-Qixun-Gateway "nginx-gateway" always;
    add_header X-Qixun-Channel "canary" always;
    add_header X-Qixun-Version "v1.2" always;

    set $upstream realestate-bot-v1-2-369629851192.asia-northeast1.run.app;

    proxy_set_header Host $upstream;
    proxy_ssl_server_name on;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter '"/openapi.json"' '"/realestate-bot/canary/openapi.json"';

    rewrite ^/realestate-bot/canary/(.*)$ /$1 break;

    proxy_pass https://$upstream;
}
