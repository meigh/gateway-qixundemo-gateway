# ===== realestate-bot v1.1 (api-v11) =====

location = /realestate-bot/v1.1 {
    return 301 /realestate-bot/v1.1/;
}

location ^~ /realestate-bot/v1.1/ {
    add_header X-Qixun-Gateway "nginx-gateway" always;

    proxy_set_header Host api-v11-369629851192.asia-northeast1.run.app;
    proxy_ssl_server_name on;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ✅ 关键：让 /realestate-bot/v1.1/docs 里的 Swagger 去抓 v1.1 自己的 openapi
    proxy_set_header Accept-Encoding "";   # 避免 gzip，才能 sub_filter
    sub_filter_once off;
    sub_filter '"/openapi.json"' '"/realestate-bot/v1.1/openapi.json"';
    sub_filter "'/openapi.json'" "'/realestate-bot/v1.1/openapi.json'";

    proxy_pass https://api-v11-369629851192.asia-northeast1.run.app/;
}
