# ========= realestate-bot v1.1 (api-v11) =========
location = /realestate-bot/v1.1 {
    return 301 /realestate-bot/v1.1/;
}

location ^~ /realestate-bot/v1.1/ {
    add_header X-Qixun-Gateway "nginx-gateway" always;

    proxy_set_header Host api-v11-369629851192.asia-northeast1.run.app;
    proxy_ssl_server_name on;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass https://api-v11-369629851192.asia-northeast1.run.app/;
}