# ========= realestate-bot (stable, v1.0 now) =========
location = /realestate-bot {
    return 301 /realestate-bot/;
}

location ^~ /realestate-bot/ {
    add_header X-Qixun-Gateway "nginx-gateway" always;

    proxy_set_header Host realestate-bot-369629851192.asia-northeast1.run.app;
    proxy_ssl_server_name on;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass https://realestate-bot-369629851192.asia-northeast1.run.app/;
}