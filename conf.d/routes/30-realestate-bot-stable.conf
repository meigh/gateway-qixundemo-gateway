# ===== realestate-bot stable -> v1.2 =====

# 裸路径重定向，方便浏览器 / 文档访问
location = /realestate-bot {
    return 301 /realestate-bot/;
}

location ^~ /realestate-bot/ {
    # 统一网关标记（方便日志观察）
    add_header X-Qixun-Gateway "nginx-gateway" always;
    add_header X-Qixun-Channel "stable" always;
    add_header X-Qixun-Version "v1.2" always;

    # ✅ 把 stable 映射到 v1.2 Cloud Run
    set $upstream realestate-bot-v1-2-369629851192.asia-northeast1.run.app;

    # 让 Cloud Run 看到自己原始 Host
    proxy_set_header Host $upstream;
    proxy_ssl_server_name on;

    # 透传客户端信息
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Swagger/OpenAPI：把内嵌的 /openapi.json 改成带前缀的路径
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter '"/openapi.json"' '"/realestate-bot/openapi.json"';

    # 剥掉 /realestate-bot/ 前缀，让后端继续用原生路径（/health、/recommend）
    # /realestate-bot/health     -> /health
    # /realestate-bot/recommend  -> /recommend
    rewrite ^/realestate-bot/(.*)$ /$1 break;

    proxy_pass https://$upstream;
}

# ===== end realestate-bot stable -> v1.2 =====
