# ===== realestate-bot stable -> v1.2 =====

location = /realestate-bot {
    return 301 /realestate-bot/;
}

location ^~ /realestate-bot/ {
    # 统一网关标记（方便日志观察）
    add_header X-Qixun-Gateway "nginx-gateway" always;
    add_header X-Qixun-Channel "stable" always;
    add_header X-Qixun-Version "v1.2" always;

    # ✅ 指向真实的 Cloud Run 服务域名（不要多写 -v1-2-）
    set $upstream realestate-bot-369629851192.asia-northeast1.run.app;

    proxy_set_header Host $upstream;
    proxy_ssl_server_name on;

    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter '"/openapi.json"' '"/realestate-bot/openapi.json"';

    # /realestate-bot/health    -> /health
    # /realestate-bot/recommend -> /recommend
    rewrite ^/realestate-bot/(.*)$ /$1 break;

    proxy_pass https://$upstream;
}

# ===== end realestate-bot stable -> v1.2 =====
