# ===== realestate-bot v1.2 beta channel =====

# 裸路径重定向到带斜杠
location = /realestate-bot/v1.2/beta {
    return 301 /realestate-bot/v1.2/beta/;
}

location ^~ /realestate-bot/v1.2/beta/ {
    add_header X-Qixun-Gateway "nginx-gateway" always;
    add_header X-Qixun-Channel "beta" always;
    add_header X-Qixun-Version "v1.2" always;

    # Cloud Run v1.2 beta tag 上游
    # TODO: 用你自己的 host 替换 <V12_BETA_HOST>
    set $upstream <V12_BETA_HOST>;

    proxy_set_header Host $upstream;
    proxy_ssl_server_name on;

    proxy_set_header X-Real-IP        $remote_addr;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # OpenAPI 内部 link 重写
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    # 这里我也让 openapi.json 的外部路径带上 v1.2/beta
    sub_filter '"/openapi.json"' '"/realestate-bot/v1.2/beta/openapi.json"';

    # 剥掉 /realestate-bot/v1.2/beta/ 前缀，下游仍然看到 /
    rewrite ^/realestate-bot/v1.2/beta/(.*)$ /$1 break;

    proxy_pass https://$upstream;
}
