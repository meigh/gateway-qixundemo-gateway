# ===== realestate-bot beta (points to v1.2 for now) =====

location = /realestate-bot/beta {
    return 301 /realestate-bot/beta/;
}

location ^~ /realestate-bot/beta/ {
    add_header X-Qixun-Gateway "nginx-gateway" always;
    add_header X-Qixun-Channel "beta" always;
    add_header X-Qixun-Version "v1.2" always;

    set $upstream realestate-bot-v1-2-369629851192.asia-northeast1.run.app;

    proxy_set_header Host $upstream;
    proxy_ssl_server_name on;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Swagger/OpenAPI 兼容：把 /openapi.json 改到带前缀的路径
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter '"/openapi.json"' '"/realestate-bot/beta/openapi.json"';

    # 剥掉 /realestate-bot/beta/ 前缀，让上游服务继续用原生 /
    rewrite ^/realestate-bot/beta/(.*)$ /$1 break;

    proxy_pass https://$upstream;
}
