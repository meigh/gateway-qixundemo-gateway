# ===== openclaw-poc runtime ingress =====

location = /runtime {
    return 301 /runtime/;
}

location ^~ /runtime/ {
    # unified gateway headers for tracing
    add_header X-Qixun-Gateway "nginx-gateway" always;
    add_header X-Qixun-Channel "openclaw-runtime" always;
    add_header X-Qixun-Version "phase1" always;

    proxy_ssl_server_name on;

    proxy_set_header Host              openclaw-poc-runtime-369629851192.asia-northeast1.run.app;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Qixun-Gateway   "nginx-gateway";

    # do not forward client Basic Auth header to Cloud Run
    proxy_set_header Authorization "";

    # /runtime/message -> /message
    # /runtime/healthz -> /healthz
    rewrite ^/runtime/(.*)$ /$1 break;

    proxy_pass https://openclaw-poc-runtime-369629851192.asia-northeast1.run.app;
}

# ===== end openclaw-poc runtime ingress =====