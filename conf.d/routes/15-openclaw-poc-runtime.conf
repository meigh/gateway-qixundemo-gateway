# ===== openclaw-poc runtime ingress =====

location = /runtime {
    return 301 /runtime/;
}

location ^~ /runtime/ {
    # unified gateway headers for tracing
    add_header X-Qixun-Gateway "nginx-gateway" always;
    add_header X-Qixun-Channel "openclaw-runtime" always;
    add_header X-Qixun-Version "phase1" always;

    # TODO: replace with actual Cloud Run runtime host after deploy
    # example:
    # set $upstream openclaw-poc-runtime-369629851192.asia-northeast1.run.app;
    set $upstream openclaw-poc-runtime-<hash>.asia-northeast1.run.app;

    proxy_set_header Host $upstream;
    proxy_ssl_server_name on;

    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header X-Qixun-Gateway   "nginx-gateway";

    # /runtime/message -> /message
    # /runtime/healthz -> /healthz
    rewrite ^/runtime/(.*)$ /$1 break;

    proxy_pass https://$upstream;
}

# ===== end openclaw-poc runtime ingress =====