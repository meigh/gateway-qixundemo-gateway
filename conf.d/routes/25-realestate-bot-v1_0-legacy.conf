# ===== realestate-bot v1.0 legacy (frozen) =====
# 目标：把 /realestate-bot/v1.0-legacy/* “伪装”成 v1.0 原生路径 /*

# 1) 没有尾斜杠时，统一补上（避免相对资源路径错乱）
location = /realestate-bot/v1.0-legacy {
  return 301 /realestate-bot/v1.0-legacy/;
}

# 2) legacy 主路由：剥掉前缀后转发到 v1.0 Cloud Run
location ^~ /realestate-bot/v1.0-legacy/ {
  add_header X-Qixun-Legacy "v1.0-frozen" always;
  add_header X-Qixun-Gateway "nginx-gateway" always;

  # Cloud Run upstream（v1.0）
  set $v10_upstream realestate-bot-369629851192.asia-northeast1.run.app;

  # 关键：Host 必须是 upstream host（Cloud Run 需要正确 Host 才能路由）
  proxy_set_header Host $v10_upstream;
  proxy_ssl_server_name on;

  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # 关键：把 /realestate-bot/v1.0-legacy/ 前缀剥掉
  rewrite ^/realestate-bot/v1\.0-legacy/(.*)$ /$1 break;

  # ===== 兼容 v1.0 页面里可能写死的 API_BASE =====
  # 若 v1.0 前端 fetch('/mortgage/calc') 这种绝对路径，会打到网关根域名。
  # 我们把这些 API 也挂在 legacy 下面（最常见的几个端点按需加）
  # 如果你不确定有哪些 API，后面我给你一条“自动抓取”命令。
  #
  # 说明：这里不需要再 rewrite，因为此时 URI 已经被 rewrite 成 /xxx 了。
  # 只要 upstream 里有对应 /mortgage/calc 等路径，就会工作。

  proxy_pass https://$v10_upstream;
}