# ====== realestate-bot v1.0 legacy (frozen) ======

# 访问 /realestate-bot/v1.0-legacy  => 统一补 /
location = /realestate-bot/v1.0-legacy {
    return 301 /realestate-bot/v1.0-legacy/;
}

location ^~ /realestate-bot/v1.0-legacy/ {

    # 标记这是冻结版本（排障用）
    add_header X-Qixun-Legacy "v1.0-frozen" always;

    # 关键：把 /realestate-bot/v1.0-legacy/ 映射回 v1.0 后端的根 /
    rewrite ^/realestate-bot/v1.0-legacy/(.*)$ /$1 break;

    # v1.0 Cloud Run
    proxy_set_header Host realestate-bot-369629851192.asia-northeast1.run.app;
    proxy_ssl_server_name on;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass https://realestate-bot-369629851192.asia-northeast1.run.app;
}
